<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body { font-family: sans-serif; }
        
        ul {
            list-style: none;           
            background: #f0f0f0;        
            padding: 20px 20px 20px 40px;
            margin: 20px;
            display: inline-block;  
            background-color: palevioletred;    
        }
        
        li {
            background: #d0d0d0;         
            margin-bottom: 8px;           
            padding: 8px 15px;             
            border-radius: 20px;
            background-color: rgb(136, 12, 53);           
        }
        
        li span {
            background: #a0a0a0;          
            padding: 3px 10px;             
            border-radius: 15px;
            background-color: rgb(87, 9, 35);
            color: white;         
        }
    </style>
</head>
<body>
     <ul>
        <li><span>1. Apple</span></li>
        <li><span>2. Orange</span></li>
        <li><span>3. Pineapple</span></li>
        <li><span>4. Pear</span></li>
        <li><span>5. Cherry</span></li>
    </ul>
</body>
</html>
