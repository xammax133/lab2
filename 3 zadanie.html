<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея с локальными изображениями</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .gallery {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

   
        .main-image-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        .main-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

   
        .main-image:target {
            opacity: 1;
            z-index: 1;
        }

    
        #img1 {
            opacity: 1;
            z-index: 1;
        }

        .thumbnails {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .thumb-link {
            display: block;
            width: 150px;
            height: 100px;
            border: 2px solid transparent;
            border-radius: 5px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
        }


        .thumb-link:hover {
            border-color: #007bff;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,123,255,0.3);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <h1>Моя галерея</h1>


        <div class="main-image-container">
            <img class="main-image" id="img1" src="images/image1.jpg" alt="Image 1">
            <img class="main-image" id="img2" src="images/image2.jpg" alt="Image 2">
            <img class="main-image" id="img3" src="images/image3.jpg" alt="Image 3">
            <img class="main-image" id="img4" src="images/image4.jpg" alt="Image 4">
            <img class="main-image" id="img5" src="images/image5.jpg" alt="Image 5">
            <img class="main-image" id="img6" src="images/image6.jpg" alt="Image 6">
        </div>

        <div class="thumbnails">
 
            <a href="#img1" class="thumb-link">
                <img class="thumb-img" src="images/image1.jpg" alt="Thumb 1">
            </a>
            <a href="#img2" class="thumb-link">
                <img class="thumb-img" src="images/image2.jpg" alt="Thumb 2">
            </a>
            <a href="#img3" class="thumb-link">
                <img class="thumb-img" src="images/image3.jpg" alt="Thumb 3">
            </a>
            <a href="#img4" class="thumb-link">
                <img class="thumb-img" src="images/image4.jpg" alt="Thumb 4">
            </a>
            <a href="#img5" class="thumb-link">
                <img class="thumb-img" src="images/image5.jpg" alt="Thumb 5">
            </a>
            <a href="#img6" class="thumb-link">
                <img class="thumb-img" src="images/image6.jpg" alt="Thumb 6">
            </a>
        </div>
    </div>
</body>
</html>
