<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My To Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: #fdf8e7;
            padding: 25px;
            border-radius: 20px;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 5px 0;
            font-size: 18px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
        }
        hr {
            border: none;
            border-top: 2px dashed #aaa;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My To Do List</h1>
        
        <ul>
            <li><input type="checkbox"> Hit the gym</li>
            <li><input type="checkbox" checked> Pay bills</li>
            <li><input type="checkbox"> Meet John</li>
            <li><input type="checkbox"> Buy eggs</li>
            <li><input type="checkbox" checked> Read a book</li>
            <li><input type="checkbox"> Organize office</li>
            <li><input type="checkbox"> Eat dinner</li>
            <li><input type="checkbox"> Buy apples</li>
            <li><input type="checkbox"> Meet George</li>
            <li><input type="checkbox"> Feed the cat</li>
            <li><input type="checkbox" checked> Write a letter</li>
            <li><input type="checkbox"> Run 1 km</li>
        </ul>

        <hr>
    </div>
</body>
</html>
